services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      default:
        aliases:
          - warehouse.minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WAREHOUSE_BUCKET: ${WAREHOUSE_BUCKET:-warehouse}
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/minio_init.sh"]

  kafka:
    image: apache/kafka:3.9.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensor-events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-sensor-events-dlq}
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/create_kafka_topics.sh"]

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      AWS_S3_PATH_STYLE_ACCESS: "true"
      CATALOG_WAREHOUSE: s3://warehouse/iceberg
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: ${MINIO_ROOT_USER:-minioadmin}
      CATALOG_S3_SECRET__ACCESS__KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CATALOG_S3_REGION: us-east-1
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"

  ingestion-api:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensor-events}
      INGESTION_PORT: ${INGESTION_PORT:-8000}
    ports:
      - "${INGESTION_PORT:-8000}:8000"

  sensor-producer:
    build:
      context: .
      dockerfile: docker/producer/Dockerfile
    depends_on:
      ingestion-api:
        condition: service_started
    environment:
      INGESTION_URL: http://ingestion-api:8000/events
      PRODUCER_INTERVAL_SECONDS: ${PRODUCER_INTERVAL_SECONDS:-1.0}

  spark-streaming:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensor-events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-sensor-events-dlq}
      WAREHOUSE_PATH: s3://warehouse/iceberg
      CHECKPOINT_PATH: s3a://warehouse/checkpoints/sensor_minute
      MINIO_ENDPOINT: http://minio:9000
      ICEBERG_REST_URI: http://iceberg-rest:8181
    command:
      - /opt/spark/bin/spark-submit
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.apache.iceberg:iceberg-aws-bundle:1.6.1,org.apache.hadoop:hadoop-aws:3.3.4
      - /opt/app/processing/streaming_job.py
    volumes:
      - ./processing:/opt/app/processing

  trino:
    image: trinodb/trino:460
    depends_on:
      iceberg-rest:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${TRINO_PORT:-8085}:8080"
    volumes:
      - ./trino/etc:/etc/trino

volumes:
  minio-data:
